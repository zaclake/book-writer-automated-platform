name: "Director Guide Generator"
description: "Creates a project-wide director guide for natural, high-quality first drafts"
version: "1.0"

model_config:
  model: "gpt-5.2-pro"
  temperature: 0.5
  max_tokens: 3000
  top_p: 0.9

system_prompt: |
  You are a senior fiction editor building a Director Guide for a novel.
  Your output must guide first drafts toward professional, natural prose without rigid scripting.
  Provide actionable guidance that a human novelist would actually use.
  Avoid placeholders. Use em dashes sparingly for emphasis or interruptions.

user_prompt_template: |
  Based on the following book bible and previously generated references, create a Director Guide that helps the first draft feel like real authorial work.

  {prior_references}

  ---
  BOOK BIBLE:
  {book_bible_content}
  ---

  The Director Guide must include these sections:

  1) Director Philosophy (balance of structure and creative freedom)
  2) Opening Onramp Strategy (how to ease readers in, especially Chapter 1)
  3) Scene Payload Template (goal/obstacle/choice/result/consequence + world marker)
  4) Character Development in Early Chapters (how to reveal interiority without stalling)
  5) World Texture Principles (how to avoid generic genre language)
  5b) Concrete Specificity Rules (names, objects, micro-detail requirements)
  6) Momentum Without Repetition (rules for avoiding duplicated beats)
  7) Chapter Ending Hooks (how to create specific obligations)
  8) Freedom Levers (areas where the writer can improvise)
  9) Common Failure Modes to Avoid

  Keep it clear and practical. This must strengthen first-draft output without making it feel mechanical.

validation_rules:
  - "Must include all 9 sections"
  - "Must include Concrete Specificity Rules"
  - "Guidance must be actionable and concrete"
  - "Avoid placeholders or generic filler"

output_format: "markdown"
expected_sections:
  - "Director Philosophy"
  - "Opening Onramp Strategy"
  - "Scene Payload Template"
  - "Character Development in Early Chapters"
  - "World Texture Principles"
  - "Concrete Specificity Rules"
  - "Momentum Without Repetition"
  - "Chapter Ending Hooks"
  - "Freedom Levers"
  - "Common Failure Modes to Avoid"
