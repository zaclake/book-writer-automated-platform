name: "World Building Generator"
description: "Creates comprehensive setting, proper noun registry, rules engine, sensory palettes, and environmental details from book bible content"
version: "3.0"

model_config:
  model: "gpt-5.2-pro"
  temperature: 0.72
  max_tokens: 9000
  top_p: 0.9

system_prompt: |
  You are a master world-building consultant specializing in creating immersive, believable fictional environments for literary and genre fiction. Your expertise encompasses historical research, cultural anthropology, architectural design, and environmental storytelling.

  CORE COMPETENCIES:
  1. **Atmospheric World Creation**: Building settings that enhance mood, theme, and character psychology
  2. **Cultural Authenticity**: Creating believable social structures, customs, and daily life details
  3. **Environmental Storytelling**: Using setting details to advance plot and reveal character
  4. **Genre-Specific World Rules**: Understanding how different genres require different approaches to world-building
  5. **Research-Based Accuracy**: Grounding fictional elements in realistic historical/geographical/cultural foundations
  6. **Machine-Readable Structure**: Include structured registries and tables that downstream writing systems can parse reliably

  APPROACH FOR INCOMPLETE BOOK BIBLES:
  When setting details are sparse or missing:
  - Extract atmospheric cues from genre, tone, and reference works
  - Build environments that support the stated themes and emotional journey
  - Create cultural details that enhance character psychology and conflict
  - Use historical/geographical research to ground fictional elements
  - Ensure every world-building detail serves story function, not just decoration

  QUALITY STANDARDS:
  - Every setting detail should enhance atmosphere and story
  - Cultural elements must feel authentic and internally consistent
  - World rules should emerge naturally from genre and theme requirements
  - Environmental details should engage multiple senses
  - Settings should feel lived-in and historically grounded

user_prompt_template: |
  Analyze this book bible thoroughly and create a comprehensive world-building reference. Focus on extracting atmospheric cues, genre requirements, and thematic needs to build a setting that enhances every aspect of the story experience.

  {book_length_context}

  {prior_references}

  ---
  BOOK BIBLE:
  {book_bible_content}
  ---

  Create a detailed world-building guide following this structure:

  # World-Building Reference Guide

  ## Proper Noun Registry

  Provide a structured table of EVERY invented or story-specific name. This is the authoritative source for spelling, categorization, and definitions of all world-specific terms.

  ### Places
  | Name | Type | Region/Parent | One-Line Description |
  |---|---|---|---|
  | [Exact spelling] | [city/town/building/landmark/district/country/continent] | [Where it sits in the larger geography] | [What it is and why it matters] |

  ### Organizations & Factions
  | Name | Type | Allegiance | One-Line Description |
  |---|---|---|---|
  | [Exact spelling] | [government/military/religious/criminal/corporate/social] | [Allied with/opposed to whom] | [What they do and their role in the story] |

  ### Systems & Technologies
  | Term | Category | One-Line Definition | Hard Rules |
  |---|---|---|---|
  | [Exact spelling] | [magic/technology/political/economic/religious] | [What it is] | [What it can and cannot do — immutable constraints] |

  ### Cultural Terms & Customs
  | Term | Context | Definition |
  |---|---|---|
  | [Exact spelling] | [When/where this term is used] | [What it means in this world] |

  (Include every proper noun, invented term, fictional system, and world-specific concept. This registry feeds into the canon log for consistency checking.)

  ## Setting Foundation Analysis

  **Atmospheric Requirements:**
  - **Mood/Tone Needs:** [How the setting should make readers feel]
  - **Genre Expectations:** [What this genre requires from its world]
  - **Thematic Support:** [How the environment should reinforce story themes]
  - **Character Psychology Reflection:** [How settings should mirror/contrast with internal states]

  **Research Foundation:**
  - **Historical Anchors:** [Real-world time periods/events that inform this setting]
  - **Geographic Inspirations:** [Real locations that provide environmental basis]
  - **Cultural References:** [Societies/communities that inspire social structures]
  - **Architectural Influences:** [Building styles and urban planning that fit the story]

  ## Primary Setting Architecture

  ### Temporal Context
  **Time Period Specifications:**
  - **Exact Era/Year:** [When the story takes place and why this matters]
  - **Historical Moment:** [Specific events or cultural shifts affecting the world]
  - **Technological Level:** [What's available and what's not, and how this shapes daily life]
  - **Social/Political Climate:** [The broader forces affecting individual lives]

  **Time's Impact on Story:**
  - **Period-Specific Opportunities:** [What this time period makes possible for the plot]
  - **Historical Constraints:** [What limitations create interesting obstacles]
  - **Cultural Attitudes:** [Prevailing beliefs that affect character choices]
  - **Communication/Transportation:** [How people connect and move, affecting plot pacing]

  ### Geographic & Environmental Framework

  **Primary Location Details:**
  - **Geographic Setting:** [Specific region, climate, topography]
  - **Urban vs. Rural Character:** [How populated/developed the area is]
  - **Natural Environment:** [Landscape features that affect mood and plot]
  - **Climate & Weather:** [How environmental conditions shape daily life and story events]
  - **Natural Resources:** [What the land provides and what's scarce]

  **Environmental Storytelling:**
  - **Symbolic Landscapes:** [How geography reflects themes or character states]
  - **Setting as Character:** [How the environment actively affects the story]
  - **Pathetic Fallacy Opportunities:** [When weather/environment should mirror emotion]
  - **Contrast Points:** [Where environmental beauty/harshness creates thematic tension]

  ## World Rules Engine

  Hard constraints that must NEVER be violated during chapter generation. These are immutable facts about how this world works.

  ### Physical Laws & Constraints
  - **Travel Rules:** [How long it takes to get from A to B by available means — specific distances and times]
  - **Communication Rules:** [How fast information travels — instant, days, weeks?]
  - **Environmental Hazards:** [What the natural world makes dangerous or impossible]
  - **Resource Scarcities:** [What's hard to get and what that means for plot possibilities]
  - **Seasonal Constraints:** [What can and cannot happen in each season]

  ### Genre-Specific Rules (if applicable)
  - **Magic/Technology System:** [Exactly what it can do, what it costs, what it cannot do]
  - **Power Scaling:** [Who is stronger/weaker than whom and why — and what can shift this]
  - **System Limitations:** [Hard boundaries that create conflict — e.g., magic cannot resurrect, FTL has a cooldown]
  - **Discovery/Learning Curve:** [How characters gain new abilities or access — and what it costs them]

  ### Social Rules
  - **Authority Structures:** [Who has power over whom and how that power is exercised]
  - **Legal Boundaries:** [What the law allows, forbids, and the consequences of violation]
  - **Cultural Taboos:** [What is forbidden, and what happens to those who violate taboos]
  - **Social Mobility:** [Can people change their status? How? What blocks them?]
  - **Information Control:** [What knowledge is restricted, by whom, and what the penalty is for sharing it]

  ## Key Location Profiles with Sensory Palettes

  For each major location where scenes take place, provide a complete sensory profile ready for direct use in prose generation.

  ### [Primary Location Name]
  **Physical Description:**
  - **First Impression:** [What strikes someone seeing it for the first time — the one detail that defines this place]
  - **Architectural Character:** [Building styles, age, condition, materials]
  - **Layout & Scale:** [How spaces are organized, size, density]

  **Sensory Palette:**
  - **Sights:** [Specific visual details — colors, light quality, textures, movement patterns]
  - **Sounds:** [Ambient noise, distinctive sounds, silence patterns — be specific: "the hum of fluorescent lights" not "city sounds"]
  - **Smells:** [Dominant scents and undertones — "damp concrete and frying garlic" not "urban smells"]
  - **Touch/Temperature:** [Air quality, surface textures, temperature, humidity]
  - **Taste (if relevant):** [What the air or local food/drink tastes like]

  **Time-of-Day Variations:**
  - **Morning:** [How this place looks, sounds, smells in early hours]
  - **Midday:** [Peak activity — sensory differences from morning]
  - **Evening/Night:** [How atmosphere shifts — lighting, sounds, who's present]

  **Mood & Atmosphere:**
  - **Emotional Signature:** [The default feeling of being in this space — claustrophobic, serene, charged, melancholic]
  - **Thematic Resonance:** [How this location embodies or challenges the story's themes]
  - **Character Associations:** [Which characters have history here, and how the place reflects them]

  **Story Function:**
  - **Plot Significance:** [Why important events happen here — what the location enables]
  - **Conflict Opportunities:** [What kinds of problems naturally arise in this setting]
  - **Scene Types:** [What kinds of scenes work best here — confrontation, intimacy, revelation, action]

  ### [Secondary Location Name]
  [Same full structure — every recurring location needs a sensory palette]

  ### [Tertiary Location]
  [Abbreviated: First Impression, Sensory Palette (3 senses), Emotional Signature, Story Function]

  ## Daily Life & Material Culture

  These details make the world feel inhabited. They provide texture for scenes and grounding for character behavior.

  **Food & Drink:**
  - **Common Meals:** [What ordinary people eat at different meals — specific dishes, preparation]
  - **Class Markers:** [How food differs by social status]
  - **Social Rituals:** [How eating and drinking function socially — shared meals, toasts, taboos]
  - **Scarcity & Abundance:** [What's plentiful, what's a luxury, what's rationed]

  **Clothing & Appearance:**
  - **Standard Dress:** [What most people wear day-to-day — fabrics, cuts, colors]
  - **Status Signifiers:** [How clothing communicates social position]
  - **Functional Gear:** [Work clothes, protective wear, specialized equipment]
  - **Grooming Standards:** [Hair, body modification, personal presentation norms]

  **Work & Economy:**
  - **Common Occupations:** [What most people do for a living]
  - **Currency & Exchange:** [How trade works — coins, barter, credit, digital]
  - **Work Rhythms:** [When people work, how long, what rest looks like]
  - **Economic Pressures:** [What financial stresses affect daily decisions]

  **Social Interaction:**
  - **Greetings & Farewells:** [How people acknowledge each other — handshake, bow, nod, specific phrases]
  - **Forms of Address:** [How people address each other based on relationship, status, context]
  - **Personal Space & Touch:** [Cultural norms about physical proximity and contact]
  - **Conflict Conventions:** [How disagreements are handled — direct confrontation, passive aggression, formal mediation]

  **Leisure & Ritual:**
  - **Entertainment:** [How people relax — games, stories, music, sports, substances]
  - **Celebrations:** [Major holidays, personal milestones, community events]
  - **Mourning & Grief:** [How loss is handled publicly and privately]
  - **Spiritual Practice:** [Daily or weekly observances, superstitions, small rituals]

  ## Cultural & Social Architecture

  ### Power Dynamics
  - **Authority Systems:** [Who holds power and how it's exercised]
  - **Class/Economic Stratification:** [Social layers and mobility between them]
  - **Professional Hierarchies:** [Work structures that affect character interactions]
  - **Gender/Age Dynamics:** [Social expectations based on demographics]
  - **Outsider/Insider Status:** [How belonging and exclusion work in this world]

  ### Institutional Framework
  - **Government Structure:** [How official power operates]
  - **Legal System:** [Laws, enforcement, justice mechanisms]
  - **Educational System:** [How knowledge is transmitted and controlled]
  - **Religious/Spiritual Institutions:** [Belief systems and their social influence]
  - **Economic Institutions:** [How money, trade, and resources flow]

  ## Atmosphere & Mood Toolkit

  **Environmental Mood Tools:**
  - **Weather as Story Element:** [Specific weather patterns to use for emotional enhancement — not generic, tied to this world's climate]
  - **Light & Shadow:** [How illumination works in this world and how to use it for atmosphere]
  - **Space & Scale:** [Claustrophobic interiors vs. overwhelming landscapes — what this world offers]
  - **Color Palette:** [Dominant colors in this world and what they signify]

  **Cultural Mood Elements:**
  - **Social Tension Points:** [Where cultural conflicts create atmospheric pressure]
  - **Tradition vs. Change:** [How cultural stability/instability affects mood]
  - **Collective Emotions:** [Shared feelings that permeate the social environment]
  - **Hidden Undercurrents:** [What's not spoken but felt in the community]

  ## Writer's World-Building Toolkit

  **Consistency Maintenance:**
  - **World Logic Checklist:** [Rules to follow for internal consistency — reference the Rules Engine section]
  - **Distance/Time Reference:** [Quick-lookup travel times between major locations]
  - **Technology/Magic Limits:** [What characters cannot do, summarized for quick reference]

  **Scene Enhancement Techniques:**
  - **Setting as Plot Device:** [How to use environment to advance story naturally]
  - **Grounding Details:** [The 2-3 sensory details to include in any scene set in this world to keep it feeling real]
  - **Character-Environment Interaction:** [How different characters relate to the same spaces differently]

  INSTRUCTIONS FOR INCOMPLETE INFORMATION:
  When the book bible lacks specific setting details:
  1. Extract atmospheric and thematic needs from provided story elements
  2. Use genre conventions and reference works to inform environmental choices
  3. Create settings that enhance character psychology and support plot needs
  4. Build cultural details that feel authentic to the established tone and period
  5. Ensure every world-building element serves story function rather than decoration
  6. Populate the Proper Noun Registry with at least 8-12 place names and any invented terms, even if the bible only names a few

  Ground all fictional elements in research-based authenticity while ensuring every detail enhances the story's emotional and thematic impact.

validation_rules:
  - "Must create immersive settings that enhance story atmosphere and theme"
  - "All cultural and environmental details must feel authentic and internally consistent"
  - "World-building elements must serve story function, not just provide decoration"
  - "Should ground fictional elements in realistic historical/geographical research"
  - "Must provide specific, sensory details that help writers create vivid scenes"
  - "Should extrapolate intelligently from genre, tone, and reference works when details are sparse"
  - "Settings must feel lived-in and historically grounded, not artificially constructed"
  - "Must include a complete Proper Noun Registry with all invented names and terms"
  - "Must include a World Rules Engine with hard constraints"
  - "Must include Sensory Palettes for every key location"
  - "Must include Daily Life details for scene grounding"

output_format: "markdown"
expected_sections:
  - "Proper Noun Registry"
  - "Setting Foundation Analysis"
  - "Primary Setting Architecture"
  - "World Rules Engine"
  - "Key Location Profiles with Sensory Palettes"
  - "Daily Life & Material Culture"
  - "Cultural & Social Architecture"
  - "Atmosphere & Mood Toolkit"
  - "Writer's World-Building Toolkit"
